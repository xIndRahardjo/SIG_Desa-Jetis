<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Sistem Informasi Geografis (SIG) untuk pemetaan potensi Sumber Daya Alam dan kapasitas produksi tingkat dusun di Desa Jetis, Kecamatan Besuki, Kabupaten Situbondo, Jawa Timur." />
  <meta name="theme-color" content="#064e3b" />
  <title>SIG Potensi SDA — Desa Jetis, Besuki, Situbondo</title>

  <!-- Leaflet CSS (v1.9.4) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ═══ Loading Overlay ═══ -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Memuat peta Desa Jetis…</div>
  </div>

  <!-- ═══ Header ═══ -->
  <header class="header" id="header">
    <div class="header__logo" aria-hidden="true">🗺️</div>
    <div class="header__text">
      <h1 class="header__title" id="headerTitle">SIG Potensi SDA & Produksi</h1>
      <p class="header__subtitle" id="headerSubtitle">Desa Jetis, Kec. Besuki, Kab. Situbondo</p>
    </div>
    <span class="header__badge">Prototipe BBK</span>
  </header>

  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar" id="sidebar">
    <!-- Disclaimer data dummy -->
    <div class="disclaimer">
      <span class="disclaimer__icon">⚠️</span>
      <span class="disclaimer__text">
        Data &amp; batas dusun bersifat <strong>estimasi</strong> untuk prototipe.
        Belum berbasis survei GPS/shapefile resmi.
      </span>
    </div>

    <!-- Layer toggle -->
    <div class="sidebar__section">
      <div class="sidebar__section-title">Layer Peta</div>
      <div class="layer-toggle" id="layerToggle">
        <button class="layer-toggle__btn active" data-layer="potensi" id="btnLayerPotensi">
          🌾 Potensi SDA / Produksi
        </button>
        <button class="layer-toggle__btn" data-layer="lingkungan" id="btnLayerLingkungan">
          ⚠️ Catatan Lingkungan
        </button>
      </div>
    </div>

    <!-- Filter pills (visible saat layer Potensi aktif) -->
    <div class="sidebar__section" id="filterSection">
      <div class="sidebar__section-title">Filter Jenis Potensi</div>
      <div class="filter-pills" id="filterPills">
        <!-- Generated by app.js -->
      </div>
    </div>

    <!-- Dusun list -->
    <div class="sidebar__section" style="padding-bottom:0;">
      <div class="sidebar__section-title" id="dusunListTitle">8 Dusun</div>
    </div>
    <div class="dusun-list" id="dusunList">
      <!-- Generated by app.js -->
    </div>
  </aside>

  <!-- ═══ Mobile Sidebar Toggle ═══ -->
  <button class="sidebar-toggle" id="sidebarToggle">
    <span class="icon">📋</span> Daftar Dusun
  </button>

  <!-- ═══ Map ═══ -->
  <div id="map"></div>

  <!-- ═══ Legend ═══ -->
  <div class="legend" id="legend">
    <!-- Generated by app.js -->
  </div>

  <!-- ═══ Legend Toggle (Mobile) ═══ -->
  <button class="legend-toggle" id="legendToggle" title="Tampilkan Legenda">
    🔖
  </button>

  <!-- ═══ Toast Notification ═══ -->
  <div class="toast" id="toast"></div>

  <!-- ═══ Scripts ═══ -->
  <!-- Leaflet JS (v1.9.4) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- App Scripts (order matters) -->
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
